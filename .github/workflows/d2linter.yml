name: d2linter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-examples:
    runs-on: ubuntu-latest
    name: Lint example D2 files
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Lint valid examples with all three checks enabled (the default)
      - name: Lint valid D2 files (format + validate + render)
        uses: ./
        with:
          find_path: "examples/valid"
          find_pattern: "*.d2"
          verbose: "true"
          fail_on_error: "true"

      # Lint invalid examples — expect errors; fail_on_error=false so the
      # CI job itself still passes while exercising all three error paths
      - name: Lint invalid D2 files (expect errors)
        uses: ./
        with:
          find_path: "examples/invalid"
          find_pattern: "*.d2"
          verbose: "true"
          fail_on_error: "false"

      # Demonstrate selective opt-out: validate + render only (no format check)
      - name: Lint valid D2 files (validate + render only)
        uses: ./
        with:
          find_path: "examples/valid"
          find_pattern: "*.d2"
          format: "false"
          verbose: "true"
          fail_on_error: "true"

